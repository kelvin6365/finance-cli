name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all targets
        run: bun run build:all

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Curated notes (RELEASE_NOTES.md) take precedence; if absent,
          # fall back to auto-generated notes from commits / PRs.
          if [ -f RELEASE_NOTES.md ]; then
            NOTES_ARG="--notes-file RELEASE_NOTES.md"
          else
            NOTES_ARG="--generate-notes"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "finance ${GITHUB_REF_NAME}" \
            $NOTES_ARG \
            dist/finance-macos-arm64 \
            dist/finance-macos-x64 \
            dist/finance-linux-x64 \
            dist/finance-windows-x64.exe
